services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      MYSQL_DSN: "root:password@tcp(mysql:3306)/shortener?parseTime=true"
      REDIS_ADDR: "redis:6379"
      BASE_URL: "http://localhost:8080"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: shortener
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7

volumes:
  mysql_data: